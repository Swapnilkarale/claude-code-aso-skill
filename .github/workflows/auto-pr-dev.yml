name: Auto-Create PR to Dev

# Branching strategy: working branches (feature-*, fix-*, docs-*, refactor-*, chore-*)
# always merge into `dev` via auto-created PRs. Only `dev` ever merges into `main`.

on:
  push:
    branches:
      - 'feature-**'
      - 'fix-**'
      - 'docs-**'
      - 'refactor-**'
      - 'chore-**'

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: auto-pr-dev-${{ github.ref }}
  cancel-in-progress: true

jobs:
  create-pr:
    name: Create PR to Dev
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify dev branch exists
        id: verify-dev
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.repos.getBranch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                branch: 'dev',
              });
              core.setOutput('exists', 'true');
            } catch (e) {
              core.setFailed(`Required base branch 'dev' does not exist. Create it from main first.`);
            }

      - name: Check if PR already exists
        id: check-pr
        if: steps.verify-dev.outputs.exists == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              base: 'dev',
              state: 'open',
            });
            if (pulls.length > 0) {
              core.setOutput('pr_exists', 'true');
              core.setOutput('pr_number', String(pulls[0].number));
            } else {
              core.setOutput('pr_exists', 'false');
            }

      - name: Extract issue number from branch name
        id: extract-issue
        if: steps.check-pr.outputs.pr_exists == 'false'
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          if [[ "$BRANCH_NAME" =~ ^(feature|fix|docs|refactor|chore)-([0-9]+)- ]]; then
            echo "issue_number=${BASH_REMATCH[2]}" >> "$GITHUB_OUTPUT"
            echo "has_issue=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_issue=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build PR title, body and labels
        id: build-pr
        if: steps.check-pr.outputs.pr_exists == 'false'
        uses: actions/github-script@v7
        env:
          BRANCH_NAME: ${{ github.ref_name }}
          HAS_ISSUE: ${{ steps.extract-issue.outputs.has_issue }}
          ISSUE_NUMBER: ${{ steps.extract-issue.outputs.issue_number }}
        with:
          script: |
            const branch = process.env.BRANCH_NAME;
            const hasIssue = process.env.HAS_ISSUE === 'true';
            const issueNumber = hasIssue ? parseInt(process.env.ISSUE_NUMBER, 10) : null;

            let issueTitle = '';
            let issueBody = '';
            if (hasIssue && Number.isInteger(issueNumber)) {
              try {
                const { data: issue } = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                });
                issueTitle = issue.title || '';
                issueBody = issue.body || '';
              } catch (e) {
                core.warning(`Could not fetch issue #${issueNumber}: ${e.message}`);
              }
            }

            const prefixMap = {
              feature:  { commit: 'feat',     labels: ['feature', 'enhancement'] },
              fix:      { commit: 'fix',      labels: ['bug', 'fix']             },
              docs:     { commit: 'docs',     labels: ['documentation']          },
              refactor: { commit: 'refactor', labels: ['refactoring']            },
              chore:    { commit: 'chore',    labels: ['chore']                  },
            };
            const typeKey = (branch.match(/^(feature|fix|docs|refactor|chore)-/) || [])[1] || 'chore';
            const { commit: commitPrefix, labels } = prefixMap[typeKey];

            let title;
            if (issueTitle) {
              title = issueTitle;
            } else {
              const slug = branch
                .replace(/^(feature|fix|docs|refactor|chore)-\d+-/, '')
                .replace(/^(feature|fix|docs|refactor|chore)-/, '')
                .replace(/-/g, ' ');
              title = `${commitPrefix}: ${slug}`;
            }

            let body = `## Auto-Generated PR\n\nThis PR was automatically created from branch \`${branch}\` and targets \`dev\`.\n\n`;
            if (hasIssue) {
              body += `**Linked issue:** #${issueNumber}\n\n`;
            }
            if (issueBody) {
              body += `## Issue Description\n\n${issueBody}\n\n`;
            }
            body += `---\n\n**Please review the PR template checklist and fill in any remaining details.**`;

            core.setOutput('title', title);
            core.setOutput('body', body);
            core.setOutput('labels', labels.join(','));

      - name: Create pull request
        if: steps.check-pr.outputs.pr_exists == 'false'
        uses: actions/github-script@v7
        env:
          PR_TITLE: ${{ steps.build-pr.outputs.title }}
          PR_BODY: ${{ steps.build-pr.outputs.body }}
          PR_LABELS: ${{ steps.build-pr.outputs.labels }}
          HAS_ISSUE: ${{ steps.extract-issue.outputs.has_issue }}
          ISSUE_NUMBER: ${{ steps.extract-issue.outputs.issue_number }}
        with:
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            const title = process.env.PR_TITLE;
            const body = process.env.PR_BODY;
            const labels = (process.env.PR_LABELS || '').split(',').filter(Boolean);

            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              head: branch,
              base: 'dev',
            });
            core.info(`Created PR #${pr.number}: ${pr.html_url}`);

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels,
              });
            }

            if (process.env.HAS_ISSUE === 'true') {
              const issueNumber = parseInt(process.env.ISSUE_NUMBER, 10);
              if (Number.isInteger(issueNumber)) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  body: `PR created: #${pr.number}\n\nReview and merge when ready.`,
                });
              }
            }

      - name: Comment on existing PR
        if: steps.check-pr.outputs.pr_exists == 'true'
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.check-pr.outputs.pr_number }}
        with:
          script: |
            const prNumber = parseInt(process.env.PR_NUMBER, 10);
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `New commits pushed (\`${context.sha.substring(0, 7)}\`). CI re-running.`,
            });
