name: Auto-Create Release PR (dev to main)

# Branching strategy enforcement: only `dev` may merge into `main`.
# This workflow is manually triggered to cut a release PR.

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type (semver bump)'
        required: true
        type: choice
        default: 'patch'
        options:
          - patch
          - minor
          - major

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: auto-pr-main
  cancel-in-progress: false

jobs:
  create-release-pr:
    name: Create Release PR (dev to main)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: dev

      - name: Check for changes since last release
        id: check-changes
        run: |
          LAST_TAG="$(git describe --tags --abbrev=0 2>/dev/null || echo v0.0.0)"
          echo "Last release tag: $LAST_TAG"

          if git rev-parse "$LAST_TAG" >/dev/null 2>&1; then
            COMMITS_SINCE="$(git rev-list "${LAST_TAG}"..HEAD --count)"
          else
            COMMITS_SINCE="$(git rev-list HEAD --count)"
          fi
          echo "Commits since release: $COMMITS_SINCE"

          if [ "$COMMITS_SINCE" -eq 0 ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "commits_count=$COMMITS_SINCE" >> "$GITHUB_OUTPUT"
            echo "last_tag=$LAST_TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if release PR already exists
        id: check-pr
        if: steps.check-changes.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:dev`,
              base: 'main',
              state: 'open',
            });
            if (pulls.length > 0) {
              core.setOutput('pr_exists', 'true');
              core.setOutput('pr_number', String(pulls[0].number));
              core.setOutput('pr_url', pulls[0].html_url);
            } else {
              core.setOutput('pr_exists', 'false');
            }

      - name: Compute next version
        id: next-version
        if: steps.check-changes.outputs.has_changes == 'true' && steps.check-pr.outputs.pr_exists == 'false'
        env:
          LAST_TAG: ${{ steps.check-changes.outputs.last_tag }}
          RELEASE_TYPE: ${{ inputs.release_type }}
        run: |
          LAST_VERSION="${LAST_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LAST_VERSION"
          MAJOR=${MAJOR:-0}; MINOR=${MINOR:-0}; PATCH=${PATCH:-0}

          case "$RELEASE_TYPE" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
            *) echo "Unknown release type: $RELEASE_TYPE" >&2; exit 1 ;;
          esac

          NEXT_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "next_version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
          echo "Next version: $NEXT_VERSION"

      - name: Build PR body
        id: build-body
        if: steps.check-changes.outputs.has_changes == 'true' && steps.check-pr.outputs.pr_exists == 'false'
        env:
          COMMITS_COUNT: ${{ steps.check-changes.outputs.commits_count }}
          LAST_TAG: ${{ steps.check-changes.outputs.last_tag }}
          NEXT_VERSION: ${{ steps.next-version.outputs.next_version }}
        run: |
          BODY_FILE="$(mktemp)"
          {
            echo "## Release PR: dev to main"
            echo
            echo "This PR promotes \`dev\` to \`main\` for release **${NEXT_VERSION}**."
            echo "It bundles **${COMMITS_COUNT}** commit(s) since \`${LAST_TAG}\`."
            echo
          } > "$BODY_FILE"

          if [ -f CHANGELOG.md ]; then
            UNRELEASED="$(awk '/^## \[Unreleased\]/{flag=1; next} /^## \[/{flag=0} flag' CHANGELOG.md | sed -e 's/[[:space:]]*$//')"
            if [ -n "$UNRELEASED" ]; then
              {
                echo "## Changes"
                echo
                echo "$UNRELEASED"
                echo
              } >> "$BODY_FILE"
            fi
          fi

          {
            echo "## Commits since ${LAST_TAG}"
            echo
            if git rev-parse "$LAST_TAG" >/dev/null 2>&1; then
              git log "${LAST_TAG}..HEAD" --pretty=format:"- %s (%h)"
            else
              git log --pretty=format:"- %s (%h)"
            fi
            echo
            echo
            echo "## Pre-Release Checklist"
            echo
            echo "- [ ] CHANGELOG.md updated with version ${NEXT_VERSION#v}"
            echo "- [ ] Version bumped in pyproject.toml"
            echo "- [ ] All quality + security checks green on dev"
            echo "- [ ] README updated for any user-facing change"
            echo "- [ ] Breaking changes documented + migration notes"
            echo
            echo "## Post-Merge Automation"
            echo
            echo "After merge to main, the \`release\` workflow will:"
            echo "- Build and publish the skill ZIP artifact"
            echo "- Tag and create a GitHub Release for ${NEXT_VERSION}"
            echo "- Sync the wiki"
          } >> "$BODY_FILE"

          echo "body_file=$BODY_FILE" >> "$GITHUB_OUTPUT"

      - name: Create release pull request
        if: steps.check-changes.outputs.has_changes == 'true' && steps.check-pr.outputs.pr_exists == 'false'
        uses: actions/github-script@v7
        env:
          NEXT_VERSION: ${{ steps.next-version.outputs.next_version }}
          BODY_FILE: ${{ steps.build-body.outputs.body_file }}
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync(process.env.BODY_FILE, 'utf8');
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Release ${process.env.NEXT_VERSION}`,
              body,
              head: 'dev',
              base: 'main',
            });
            core.info(`Created release PR #${pr.number}: ${pr.html_url}`);
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: ['release'],
            });

      - name: Existing PR notice
        if: steps.check-pr.outputs.pr_exists == 'true'
        env:
          PR_URL: ${{ steps.check-pr.outputs.pr_url }}
        run: |
          echo "Release PR already open: $PR_URL"

      - name: No changes notice
        if: steps.check-changes.outputs.has_changes == 'false'
        run: echo "Nothing to release; dev is at the last tag."
