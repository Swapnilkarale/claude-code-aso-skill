name: Wiki Sync

# Mirrors selected documentation from main into the GitHub wiki.

on:
  push:
    branches: [main]
    paths:
      - 'README.md'
      - 'CHANGELOG.md'
      - 'CLAUDE.md'
      - 'PROJECT-STATUS.md'
      - 'documentation/**'
      - 'app-store-optimization/**/*.py'
      - '.github/workflows/wiki-sync.yml'
      - 'scripts/generate-wiki-content.py'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wiki-sync
  cancel-in-progress: false

jobs:
  sync-wiki:
    name: Sync Content to Wiki
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Checkout wiki repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}.wiki
          path: wiki
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Generate wiki content
        run: |
          if [ -f scripts/generate-wiki-content.py ]; then
            python scripts/generate-wiki-content.py
          else
            echo "No wiki generator script found; skipping."
          fi

      - name: Assemble wiki files
        env:
          PROJECT_VERSION: ${{ vars.PROJECT_VERSION || '1.0.0' }}
        run: |
          set -e
          mkdir -p wiki

          if compgen -G "/tmp/wiki/*.md" > /dev/null; then
            cp -f /tmp/wiki/*.md wiki/
          fi

          UPDATED="$(date +"%B %d, %Y")"

          cat > wiki/Home.md <<EOF
          # ASO Skill Wiki

          Welcome to the comprehensive ASO (App Store Optimization) Skill documentation.

          ## Quick Navigation

          ### Getting Started
          - [Installation Guide](Installation)
          - [Quick Start](Quick-Start)
          - [Configuration](Configuration)

          ### Core Features
          - [Keyword Analysis](Keyword-Analysis)
          - [Metadata Optimization](Metadata-Optimization)
          - [Competitor Analysis](Competitor-Analysis)
          - [A/B Testing](AB-Testing)
          - [Localization](Localization)
          - [Review Analysis](Review-Analysis)
          - [Launch Planning](Launch-Planning)

          ### ASO Agents
          - [Agent Overview](ASO-Agents)
          - [aso-master](ASO-Agent-Master)
          - [aso-research](ASO-Agent-Research)
          - [aso-optimizer](ASO-Agent-Optimizer)
          - [aso-strategist](ASO-Agent-Strategist)

          ### Reference
          - [API Documentation](API-Reference)
          - [Platform Constraints](Platform-Constraints)
          - [Character Limits](Character-Limits)

          ### Project
          - [Release History](Release-History)
          - [Roadmap](Roadmap)
          - [Contributing](Contributing)
          - [FAQ](FAQ)

          ---

          **Version:** ${PROJECT_VERSION} | **Updated:** ${UPDATED}
          EOF

          # Extract sections from README defensively
          if [ -f README.md ]; then
            awk '/^## Installation/{flag=1} flag; /^## Usage/{flag=0}' README.md \
              | sed '$d' > wiki/Installation.md || true
            awk '/^## Quick Start/{flag=1} flag; /^## Features/{flag=0}' README.md \
              | sed '$d' > wiki/Quick-Start.md || true
          fi

          [ -f CHANGELOG.md ] && cp CHANGELOG.md wiki/Release-History.md || true
          [ -f PROJECT-STATUS.md ] && cp PROJECT-STATUS.md wiki/Roadmap.md || true
          [ -f .github/CONTRIBUTING.md ] && cp .github/CONTRIBUTING.md wiki/Contributing.md || true

          cat > wiki/Platform-Constraints.md <<EOF
          # Platform Constraints

          ## Character Limit Reference

          ### Apple App Store

          | Field            | Limit          | Notes                                |
          |------------------|----------------|--------------------------------------|
          | Title            | 30 characters  | Critical for visibility              |
          | Subtitle         | 30 characters  | Displays under app name              |
          | Promotional Text | 170 characters | Can update without new version       |
          | Description      | 4000 characters| Not indexed for search               |
          | Keywords         | 100 characters | Comma-separated, no spaces           |

          ### Google Play Store

          | Field             | Limit          | Notes                            |
          |-------------------|----------------|----------------------------------|
          | Title             | 50 characters  | Indexed for search               |
          | Short Description | 80 characters  | First thing users see            |
          | Full Description  | 4000 characters| Indexed for search               |
          | Keywords          | N/A            | Extracted from title/description |

          ## Best Practices

          ### Apple App Store
          - Use all 100 characters for keywords
          - No spaces after commas in keyword field
          - Keywords not in title/subtitle still count
          - Test with App Store Connect preview

          ### Google Play Store
          - Front-load important keywords in title
          - Use the 80-character short description wisely
          - Include keywords naturally in full description
          - No keyword stuffing (penalized)

          **Last Updated:** ${UPDATED}
          EOF

          echo "Wiki content prepared."

      - name: Commit and push to wiki
        working-directory: wiki
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --staged --quiet; then
            echo "No wiki changes to commit."
          else
            git commit -m "Auto-sync from main: ${COMMIT_SHA}"
            git push
            echo "Wiki updated successfully."
          fi

      - name: Summary
        run: |
          {
            echo "## Wiki Sync Complete"
            echo
            echo "Updated wiki from main branch push."
            echo
            echo "**Files synced:**"
            echo "- Home.md (generated)"
            echo "- Installation.md (from README)"
            echo "- Quick-Start.md (from README)"
            echo "- Release-History.md (from CHANGELOG)"
            echo "- Roadmap.md (from PROJECT-STATUS)"
            echo "- Contributing.md (from .github/CONTRIBUTING)"
            echo "- Platform-Constraints.md (generated)"
            echo
            echo "**Wiki URL:** https://github.com/${{ github.repository }}/wiki"
          } >> "$GITHUB_STEP_SUMMARY"
