name: Python Quality Checks

on:
  pull_request:
    branches: [dev, main]
    paths:
      - '**.py'
      - 'pyproject.toml'
      - '.github/workflows/python-quality.yml'
  push:
    branches: [dev, main]
    paths:
      - '**.py'
      - 'pyproject.toml'
      - '.github/workflows/python-quality.yml'

permissions:
  contents: read

concurrency:
  group: python-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RUFF_VERSION: '0.6.9'

jobs:
  quality:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12', '3.13']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install ruff (pinned)
        run: |
          python -m pip install --upgrade pip
          pip install "ruff==${RUFF_VERSION}"

      - name: Syntax validation
        run: |
          set -e
          echo "Validating Python syntax..."
          find app-store-optimization scripts -name '*.py' -type f -print0 \
            | xargs -0 -r python -m py_compile
          echo "All Python files have valid syntax."

      - name: Ruff lint
        run: ruff check app-store-optimization scripts --output-format=github

      - name: Ruff format check
        run: ruff format --check app-store-optimization scripts

      - name: File structure validation
        run: |
          set -e
          root_py_files=$(find . -maxdepth 1 -name '*.py' -type f 2>/dev/null || true)
          if [ -n "$root_py_files" ]; then
            echo "ERROR: Python files found in repository root:"
            echo "$root_py_files"
            echo "Move them under app-store-optimization/, scripts/, or tests/."
            exit 1
          fi
          echo "Repository structure OK."

      - name: Character limit constants check
        if: matrix.python-version == '3.13'
        run: |
          set -e
          file=app-store-optimization/metadata_optimizer.py
          for needle in 'APPLE_TITLE_LIMIT = 30' 'APPLE_SUBTITLE_LIMIT = 30' 'GOOGLE_TITLE_LIMIT = 50'; do
            if ! grep -q "$needle" "$file"; then
              echo "WARNING: expected constant not found in $file: $needle"
            fi
          done
          echo "Platform character limit constants validated."

  quality-summary:
    name: Quality Summary
    runs-on: ubuntu-latest
    needs: quality
    if: always()

    steps:
      - name: Check quality status
        env:
          RESULT: ${{ needs.quality.result }}
        run: |
          if [ "$RESULT" = success ]; then
            echo "All Python quality checks passed."
            exit 0
          fi
          echo "Python quality checks failed (result: $RESULT)."
          exit 1
